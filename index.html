<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glow Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff;
}

.studio-hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.overlay{
background:rgba(0,0,0,.6);
padding:60px;
text-align:center;
color:white;
}

.hero-btns{
margin-top:20px;
}

.btn{
background:#ff4d6d;
padding:12px 25px;
color:white;
text-decoration:none;
margin:10px;
display:inline-block;
}

.section{
padding:60px;
text-align:center;
}

.service-card{
background:#f4f4f4;
padding:20px;
margin:10px;
display:inline-block;
width:220px;
}

.price-card{
background:#111;
color:white;
padding:25px;
margin:10px;
display:inline-block;
width:230px;
}

.gallery img{
width:250px;
margin:10px;
}

footer{
background:black;
color:white;
padding:20px;
text-align:center;
}
.btn-outline{
border:2px solid white;
padding:12px 25px;
color:white;
text-decoration:none;
border-radius:30px;
transition:.3s;
}

.btn-outline:hover{
background:white;
color:black;
}

.service-card{
transition:.4s;
}

.service-card:hover{
transform:translateY(-10px);
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.price-card{
transition:.4s;
}

.price-card:hover{
background:#ff4d6d;
transform:scale(1.05);
}

.gallery img{
border-radius:15px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.08);
}
</style>

</head>
<body>

<header class="studio-hero">
<div class="overlay">
<h1>India’s Most Trusted Beauty Studio</h1>
<p>Hair • Makeup • Bridal • Skin Experts</p>

<div class="hero-btns">
<a href="#" class="btn">Book Appointment</a>
<a href="#gallery" class="btn-outline">View Work</a>
</div>
</div>
</header>

<section class="section">
<h2>Our Premium Services</h2>

<div class="service-card">✨ Luxury Hair Styling</div>
<div class="service-card">💄 HD Makeup Studio</div>
<div class="service-card">🌸 Skin Glow Treatment</div>

</section>

<section class="section">
<h2>Packages</h2>

<div class="price-card">Basic ₹799</div>
<div class="price-card">Premium ₹1999</div>
<div class="price-card">Bridal ₹9999</div>

</section>

<section class="section gallery" id="gallery">
<h2>Our Work</h2>

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">
<img src="https://picsum.photos/300?4">

</section>

<footer>
Glow Studio © 2026
</footer>

</body>
</html>
